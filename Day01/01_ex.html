<!-- 웹문서 .html 의 실행은 웹브라우저로 문서를 보여주는 것임 -->
 <!-- 이를 편하게 해주는 VSCode의 확장 프로그램 open in browser 를 설치 -->

<!DOCTYPE html>
<html>
    <!-- 1. 화면에 보이지 않는 영역 (주소줄 영역) 웹문서를 설명하는 내용들 작성 -->
    <head>
        <title>나의 페이지</title>

        <style>
            p{color: red;}
        </style>
    </head>

    <!-- 2. 브라우저의 화면 영역 -->
    <body>
        <p>hello web</p>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <!-- title은 하나의 .html 문서 안에 1개만 적용됨: 먼저 써있는것 -->
        <title>나의 페이지 2</title>

        <style>
            p{color: green;}
        </style>
    </head>

    <body>
        <p>nice to meet you</p>
    </body>
</html>

<!-- html 요소 밖에 글씨를 써도 보임 -->
good job!

<!-- html 요소 밖에 태그문을 써도 인식함 -->
<h1>두꺼운 글씨</h1>
