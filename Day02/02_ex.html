<!DOCTYPE html>
<html>
    <head>
    <meta charset="utf-8">
    <title>element ex</title>
    </head>

    <body>
        <!-- 1. audio 요소 -->
        <audio src="./audio/old_pop.mp3" controls = 'controls'>오디오 태그가 지원되지 않으면 보이는 글씨</audio>
        
         <!-- 브라우저 마다 지원가능한 음원의 유형이 다르기에 이를 대응하기 -->
        <audio controls>
            <!-- type은 MIME 타입을 지정 -->
            <source src="./audio/old_pop.mp3" type="audio/mp3">
            <source src="./audio/old_pop.wav" type="audio/wav">
            <source src="./audio/old_pop.ogg" type="audio/ogg">
        </audio>
        <!-- 미디어파일 무료 변환 사이트 online converter.com -->
        
        <hr>
        <!-- 비디오 요소 -->
         <video controls>
            <source src ="./video/movie.ogv" type="video/ogg">
         </video>
        
         <!-- autoplay muted와 함께 있어야 자동 재생 가능임 -->
         <video controls width="480" height="320" poster="./image/koala.jpg" autoplay method>
            <source src="./video/trailer.mp4" type="video/mp4">
            <source src="./video/trailer.webm" type="video/webm">
            <source src="./video/trailer.ogv" type="video/ogg">
         </video>

         <!-- 예전에 미디어파일 전용 요소가 없을때 사용하던 요소(embed, object) -->
        <embed src="./SQL.pdf" type="application/pdf">
        <hr>
        <object data="./SQL.pdf" type="application/pdf" width="50%" height="300"></object>
        <hr>
        <!-- 현재는 embed, object 보다는 iframe 으로 사용하는 것을 권장 -->

        <!-- 3. iframe (inline frame): 다른 HTML문서를 내 문서 안에서 보여주기 -->
        <!-- 3-1. 상대경로 -->
        <iframe src="./01_table.html"></iframe>
        <!-- 3-1. 절대경로 -->
        <iframe src="https://mbca2025aix.dothome.co.kr/index.html" frameborder="0"></iframe>
        <iframe src="https://sr.mbccomputer.co.kr/front/home?n_media=335738&n_query=MBCA%EC%8B%A0%EB%A6%BC&n_rank=1&n_ad_group=grp-a001-01-000000042403151&n_ad=nad-a001-01-000000302503984&n_campaign_type=1&n_ad_group_type=1&n_match=2&NaPm=ct%3Dmpm12nic%7Cci%3DER41442450%2D58ac%2D11f1%2Da371%2D920ee43031fc%7Ctr%3Dsa%7Chk%3Db0555c8ef72881fc5afeb0ff7a099601102513c3%7Cnacn%3DEkirBEBXwfTKB" frameborder="0"></iframe>
        <hr>
        <!-- 3-3. 하이퍼링크 요소<a>에 의해 열리는 페이지를 iframe 안에 열기 name속성 지정 -->
        <iframe src="" frameborder="2" name="aaa" width="480"></iframe>
        <a href="https://www.daum.net" target="aaa">다음 포털 사이트</a>
        <!-- iframe 이 열지 못하는 사이트도 존재함. 보통 동적으로 화면을 구성하는 사이트들(요즘 많은 사이트가 이렇게 만들고 있음) -->
        <a href="https://www.naver.com" target="aaa">네이버 포털 사이트</a>
        <hr>
        <!-- pdf 파일 뷰어도 iframe을 권장 -->
        <iframe src="SQL.pdf" frameborder="0" width='50%', height="300"></iframe>

        <hr>

        <!-- 4. 화면의 일부 영역을 구분하는 용도의 요소 2개: div, span -->
        <div style="background-color: greenyellow; border:2px solid yellow; padding-left: 10px">
            <h2>TITLE</h2>
            <p>This is message</p>
        </div>

        <!-- div의 블럭요소 특징(어떤 요소와 만나던 한줄을 차지함) -->
        <p>안녕하세요. 나는 <div style="color: blue;">홍길동</div>입니다.</p>


        <!-- span의 인라인요소 특징 -->
        <p>안녕하세요. 나는 <span style="color: blue;">홍길동</span>입니다.</p>

        <hr>

        <!-- div요소는 실제 현업의 프론트엔드(웹 페이지 화면)개발할때 가장 많이 사용함 -->
        <!-- 웹 페이지를 만들때 보통 먼저 페이지의 구조를 구성하는 것부터 시작함 -->
        <!-- 이때 div를 사용함 -->
        <div id="header" style="background-color: yellow;">앱 상단 로고 영역</div>
        <div id="main" style="background-color: orange; height: 400px;">메인 영역</div>
        <div id="footer" style="background-color: red;">웹 하단 바 영역</div>
    </body>
</html>
